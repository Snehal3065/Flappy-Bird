    // ==================== UPDATE LOOP ====================
    function update() {
      if (gameState !== 'playing') return;
      updateDurationPowerups();
      const speed = gameSpeed;
      
      // Bird physics during boss fight
      if (bossActive && boss && boss.hp > 0) {
        updateBirdMiddle();
      } else {
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.1));
      }
      
      // Auto-jump powerup
      if (activeDurationPowerups['autoJump'] && frame % 60 === 0) {
        bird.velocity = bird.lift;
        spawnParticles(bird.x + bird.width / 2, bird.y + bird.height, '#F39C12', 5);
      }
      
      // Coin magnet powerup
      if (activeDurationPowerups['coinMagnet']) {
        coinItems.forEach(c => {
          if (!c.collected) {
            const dx = bird.x - c.x;
            const dy = bird.y - c.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
              c.x += dx * 0.05;
              c.y += dy * 0.05;
            }
          }
        });
      }
      
      if (bird.y < 20) { bird.y = 20; bird.velocity = 0; }
      if (bird.y + bird.height > 550) {
        if (bird.hasShield) {
          bird.hasShield = false;
          bird.y = 550 - bird.height;
          bird.velocity = -8;
          spawnParticles(bird.x + bird.width / 2, 550, '#4ECDC4', 15);
          showNotify('Shield Used!');
        } else {
          playDeath();
          gameOver();
          return;
        }
      }
      
      // Spawn pipes
      if (frame % 100 === 0 && !bossActive) {
        let canSpawn = true;
        if (pipes.length > 0) {
          const lastPipe = pipes[pipes.length - 1];
          if (lastPipe.x > 400 - getHorizontalGap()) canSpawn = false;
        }
        if (canSpawn) {
          const currentGap = getGapSize();
          const th = Math.random() * 220 + 80;
          const bottomH = 600 - 50 - th - currentGap;
          if (bottomH > 80) {
            pipes.push({ x: 400, top: th, bottom: bottomH, scored: false, gap: currentGap });
            if (Math.random() > 0.5) coinItems.push({ x: 400 + pipeWidth / 2 - 15, y: th + currentGap / 2 - 15, collected: false });
            if (Math.random() > 0.8) {
              const t = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
              powerups.push({ x: 400 + pipeWidth / 2 - 17, y: th + currentGap / 2 - 17, type: t, collected: false });
            }
          }
        }
        if (score > 0 && score % 10 === 0 && !bossWarningShown) {
          bossWarningShown = true;
          showNotify('BOSS!');
          playBoss();
          setTimeout(startBossFight, 1500);
        }
      }
      
      // Update pipes
      pipes.forEach((p, i) => {
        p.x -= speed;
        if (!bird.ghostMode && bird.x < p.x + pipeWidth && bird.x + bird.width > p.x && (bird.y < p.top || bird.y + bird.height > 600 - p.bottom)) {
          if (bird.fireTrail) {
            spawnParticles(p.x + pipeWidth / 2, p.top + 30, '#FF6B6B', 20);
            pipes.splice(i, 1);
            score += 2;
            return;
          }
          if (bird.hasShield) {
            bird.hasShield = false;
            spawnParticles(bird.x + bird.width / 2, bird.y + bird.height / 2, '#4ECDC4', 15);
            showNotify('Shield!');
            pipes.splice(i, 1);
            return;
          } else {
            playDeath();
            gameOver();
            return;
          }
        }
        if (p.x + pipeWidth < bird.x && !p.scored) { score++; p.scored = true; playScore(); if (score % 5 === 0) gameSpeed = Math.min(4, gameSpeed + 0.2); }
        if (p.x + pipeWidth < 0) pipes.splice(i, 1);
      });
      
      // Coins and powerups
      coinItems = coinItems.filter(c => {
        c.x -= speed;
        if (!c.collected && bird.x < c.x + 30 && bird.x + bird.width > c.x && bird.y < c.y + 30 && bird.y + bird.height > c.y) {
          coins++;
          saveCoins();
          playCoin();
          spawnParticles(c.x + 15, c.y + 15, '#FFD700', 8);
          return false;
        }
        return c.x > -30;
      });
      
      powerups = powerups.filter(p => {
        p.x -= speed;
        if (!p.collected && bird.x < p.x + 35 && bird.x + bird.width > p.x && bird.y < p.y + 35 && bird.y + bird.height > p.y) {
          if (equippedPowerups.includes(p.type)) {
            playPowerup();
            activatePowerup(p.type);
            spawnParticles(p.x + 17, p.y + 17, '#fff', 12);
          }
          return false;
        }
        return p.x > -35;
      });
      
      // Boss fight
      if (bossActive && boss && boss.hp > 0) {
        bossTimer--;
        
        if (!boss.state) boss.state = 'attacking';
        if (boss.state === 'attacking') {
          boss.attackTimer++;
          if (boss.attackTimer > 180) { boss.state = 'overheated'; boss.overheatTimer = 180; }
        } else if (boss.state === 'overheated') {
          boss.overheatTimer--;
          if (boss.overheatTimer <= 0) { boss.state = 'attacking'; boss.attackTimer = 0; }
        }
        
        if (bossTimer <= 0) {
          const bonusPoints = 5 + (bossLevel - 1) * 5;
          const bonusCoins = 1 + Math.floor(Math.random() * 3);
          score += bonusPoints;
          coins += bonusCoins;
          saveCoins();
          playBossDefeat();
          boss = null;
          bossActive = false;
          bossWarningShown = false;
          bossLevel = 0;
          projectiles = [];
          playerProjectiles = [];
          document.getElementById('attackBtn').classList.remove('visible');
          showNotify('SURVIVED! +' + bonusPoints + '💰 +' + bonusCoins + '🪙');
          return;
        }
        
        boss.y += boss.direction * 2;
        if (boss.y < 80 || boss.y > 470) boss.direction *= -1;
        
        // Move boss from right to left until it reaches position
        if (boss.x > 320) {
          boss.x -= 2;
        }
        
        if (boss.state !== 'overheated' && boss.state !== 'frozen' && frame % 45 === 0) {
          projectiles.push({ x: boss.x - 40, y: boss.y, vx: -5 });
        }
        
        // Boss projectiles
        projectiles.forEach((p, i) => {
          p.x += p.vx;
          if (bird.x < p.x + 16 && bird.x + bird.width > p.x - 8 && bird.y < p.y + 16 && bird.y + bird.height > p.y - 8) {
            if (bird.hasShield) {
              bird.hasShield = false;
              spawnParticles(bird.x + bird.width / 2, bird.y + bird.height / 2, '#4ECDC4', 15);
              showNotify('Blocked!');
              projectiles.splice(i, 1);
            } else {
              playDeath();
              gameOver();
              return;
            }
          }
          if (p.x < -20) projectiles.splice(i, 1);
        });
        
        // Player projectiles
        
        playerProjectiles.forEach((p, i) => {
          // Handle delayed shots (Parrot rapid fire)
          if (p.delay > 0) {
            p.delay--;
            return;
          }
          
          p.x += p.vx;
          p.y += p.vy;
          
          // Handle Phoenix burn damage over time
          if (p.burnDamage && p.burnTimer) {
            p.burnTimer--;
            if (p.burnTimer <= 0) {
              if (boss && boss.hp > 0) {
                boss.hp -= p.burnDamage;
                boss.hitFlash = 3;
                spawnParticles(boss.x, boss.y - 20, '#FF5722', 3);
              }
              p.burnTimer = 30; // Burn every 0.5 seconds
            }
          }
          
          if (boss && p.x > boss.x - 50 && p.x < boss.x + 60 && p.y > boss.y - 80 && p.y < boss.y + 100) {
            boss.hp -= p.damage;
            boss.hitFlash = 5;
            
            // Special effects based on projectile type
            if (p.type === 'ice') {
              // Owl Ice - Freeze boss
              boss.state = 'frozen';
              boss.freezeTimer = 120; // 2 seconds (120 frames)
              spawnParticles(p.x, p.y, '#00BCD4', 15);
              showNotify('❄️ FROZEN!');
            } 
            else if (p.type === 'phoenix') {
              // Phoenix - Explosion + burn
              spawnParticles(p.x, p.y, '#FF5722', 20);
              spawnParticles(p.x, p.y, '#FFEB3B', 15);
              p.burnTimer = 30;
            } 
            else if (p.type === 'pierce') {
              // Eagle - Piercing (don't remove projectile)
              spawnParticles(p.x, p.y, '#00FFFF', 8);
            }
            else if (p.type === 'golden') {
              // Golden - Big explosion
              spawnParticles(p.x, p.y, '#FFD700', 25);
              spawnParticles(p.x, p.y, '#FFEB3B', 20);
            }
            else {
              spawnParticles(p.x, p.y, p.color || '#00FFFF', 10);
            }
            
            // Remove projectile unless it's piercing
            if (!p.pierce) {
              playerProjectiles.splice(i, 1);
            }
            
            if (boss.hp <= 0) {
              const bonusPoints = 10 + (bossLevel - 1) * 5;
              const bonusCoins = 2 + Math.floor(Math.random() * 3);
              score += bonusPoints;
              coins += bonusCoins;
              saveCoins();
              playBossDefeat();
              spawnParticles(boss.x, boss.y, '#FFD700', 50);
              boss = null;
              bossActive = false;
              bossWarningShown = false;
              bossLevel = 0;
              projectiles = [];
              playerProjectiles = [];
              document.getElementById('attackBtn').classList.remove('visible');
              showNotify('GATEKEEPER DEFEATED! +' + bonusPoints + '💰 +' + bonusCoins + '🪙');
              return;
            }
          }
          
          if (p.x > 420) playerProjectiles.splice(i, 1);
        });
        
        // Handle boss freeze
        if (boss && boss.state === 'frozen') {
          boss.freezeTimer--;
          if (boss.freezeTimer <= 0) {
            boss.state = 'attacking';
          }
        }
      }
       
       frame++;
    }
    
    function saveCoins() {
      localStorage.setItem('flappyCoins', coins);
    }
    
    function showNotify(t) {
      const n = document.getElementById('powerupNotify');
      n.textContent = t;
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 2000);
    }
    
    function startBossFight() {
      bossLevel = Math.floor(score / 10);
      bossTimer = score * 60;
      bossActive = true;
      boss = { x: 480, y: 300, hp: 100 + bossLevel * 50, maxHp: 100 + bossLevel * 50, direction: 1, state: 'attacking', attackTimer: 0, hitFlash: 0 };
      bird.y = 280;
      bird.velocity = 0;
      bossJumpTimer = 0;
      pipes = pipes.filter(p => p.x > 500);
      
      // Show attack button for mobile
      document.getElementById('attackBtn').classList.add('visible');
    }
    
    function activatePowerup(t) {
      const storeItem = storeItems.find(item => item.id === t);
      
      if (t === 'shield') { 
        bird.hasShield = true; 
        showNotify('🛡️ Shield!'); 
      }
      else if (t === 'double') { 
        bird.hasDoubleJump = true; 
        showNotify('🦅 Double!'); 
      }
      else if (storeItem) {
        if (storeItem.type === 'instant') {
          if (t === 'scoreBonus') { score += 50; showNotify('⭐ +50 Points!'); }
          else if (t === 'extraLife') { bird.hasShield = true; showNotify('❤️ +1 Shield!'); }
          else if (t === 'coinRain') { 
            for (let i = 0; i < 10; i++) {
              setTimeout(() => coinItems.push({ x: Math.random() * 400, y: -30, collected: false }), i * 200);
            }
            showNotify('💰 Coin Rain!'); 
          }
        } else if (storeItem.type === 'duration') {
          activateDurationPowerup(t, storeItem.duration);
        }
      }
    }
    
    let activeDurationPowerups = {};
    
    function activateDurationPowerup(type, duration) {
      activeDurationPowerups[type] = duration * 60;
      if (type === 'coinMagnet') showNotify('🧲 Coin Magnet!');
      else if (type === 'autoJump') showNotify('⚡ Auto-Jump!');
      else if (type === 'miniBird') { bird.width = 20; bird.height = 17; showNotify('🐦 Mini Bird!'); }
      else if (type === 'pipeFreeze') { gameSpeed = 0; showNotify('❄️ Pipe Freeze!'); }
      else if (type === 'ghostMode') { bird.ghostMode = true; showNotify('👻 Ghost Mode!'); }
      else if (type === 'speedBoost') { gameSpeed = 4; showNotify('🚀 Speed Boost!'); }
      else if (type === 'fireTrail') { bird.fireTrail = true; showNotify('🔥 Fire Trail!'); }
    }
    
    function updateDurationPowerups() {
      for (let type in activeDurationPowerups) {
        if (activeDurationPowerups[type] > 0) {
          activeDurationPowerups[type]--;
          if (activeDurationPowerups[type] <= 0) {
            if (type === 'miniBird') { bird.width = 40; bird.height = 35; }
            if (type === 'pipeFreeze') { gameSpeed = 2; }
            if (type === 'ghostMode') { bird.ghostMode = false; }
            if (type === 'speedBoost') { gameSpeed = 2; }
            if (type === 'fireTrail') { bird.fireTrail = false; }
            delete activeDurationPowerups[type];
          }
        }
      }
    }
    
    function handleJump() {
      if (bossActive && boss && boss.hp > 0) {
        bird.y -= 70;
        if (bird.y < 50) bird.y = 50;
        if (bird.y > 500) bird.y = 500;
        bossJumpTimer = 20; // Wait 20 frames before returning to middle
      } else {
        playJump();
        if (bird.hasDoubleJump && !jumpPressed) { bird.velocity = bird.lift; jumpPressed = true; bird.hasDoubleJump = false; spawnParticles(bird.x + bird.width / 2, bird.y + bird.height, '#F39C12', 5); }
        else if (!jumpPressed) { bird.velocity = bird.lift; jumpPressed = true; }
      }
    }
    
    // During boss fight, bird returns to middle when not jumping
    let bossJumpTimer = 0;
    function updateBirdMiddle() {
      if (bossActive && boss && boss.hp > 0) {
        if (bossJumpTimer > 0) {
          bossJumpTimer--;
        } else {
          const targetY = 280;
          const returnSpeed = 3;
          if (bird.y < targetY - 5) {
            bird.y += returnSpeed;
          } else if (bird.y > targetY + 5) {
            bird.y -= returnSpeed;
          } else {
            bird.y = targetY;
          }
        }
        bird.rotation = 0;
      }
    }
    
    function handleAttack() {
      if (bossActive && boss && boss.hp > 0) {
        const birdY = bird.y + bird.height / 2;
        
        // Different attacks based on bird type
        switch(selectedChar) {
          case 0: // Classic - Energy Ball
            playerProjectiles.push({ 
              x: bird.x + bird.width, 
              y: birdY, 
              vx: 10, 
              vy: 0, 
              damage: 10, 
              type: 'energy',
              size: 12,
              color: '#00BFFF'
            });
            playShoot();
            break;
            
          case 1: // Red Parrot - Rapid Fire (3 shots)
            for (let i = 0; i < 3; i++) {
              playerProjectiles.push({ 
                x: bird.x + bird.width + i * 15, 
                y: birdY + (i - 1) * 8, 
                vx: 12, 
                vy: (i - 1) * 0.5, 
                damage: 5, 
                type: 'fireball',
                size: 10,
                color: '#FF5722',
                delay: i * 5
              });
            }
            playShoot();
            break;
            
          case 2: // Eagle - Piercing Bolt
            playerProjectiles.push({ 
              x: bird.x + bird.width, 
              y: birdY, 
              vx: 15, 
              vy: 0, 
              damage: 20, 
              type: 'pierce',
              size: 8,
              color: '#00FFFF',
              pierce: true
            });
            playShoot();
            break;
            
          case 3: // Owl - Ice Crystal (Freeze)
            playerProjectiles.push({ 
              x: bird.x + bird.width, 
              y: birdY, 
              vx: 8, 
              vy: 0, 
              damage: 0, 
              type: 'ice',
              size: 14,
              color: '#00BCD4'
            });
            playShoot();
            break;
            
          case 4: // Phoenix - Fire Explosion
            playerProjectiles.push({ 
              x: bird.x + bird.width, 
              y: birdY, 
              vx: 9, 
              vy: 0, 
              damage: 15, 
              burnDamage: 5,
              type: 'phoenix',
              size: 16,
              color: '#FF5722'
            });
            playShoot();
            break;
            
          case 5: // Golden Eagle - Super Laser
            playerProjectiles.push({ 
              x: bird.x + bird.width, 
              y: birdY, 
              vx: 12, 
              vy: 0, 
              damage: 30, 
              type: 'golden',
              size: 20,
              color: '#FFD700'
            });
            playShoot();
            break;
        }
      }
    }
    
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); initAudio(); handleJump(); }
      if (e.code === 'KeyX') { e.preventDefault(); initAudio(); handleAttack(); }
    });
    canvas.addEventListener('mousedown', () => { initAudio(); handleJump(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); handleJump(); }, { passive: false });
    document.addEventListener('keyup', e => { if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false; });
    canvas.addEventListener('mouseup', () => jumpPressed = false);
    canvas.addEventListener('touchend', () => jumpPressed = false);
    
    function startGame() {
      initAudio();
      stopAllAmbient();
      gameState = 'playing';
      score = 0;
      gameSpeed = 2;
      frame = 0;
      bossWarningShown = false;
      bossLevel = 0;
      bossJumpTimer = 0;
      activeDurationPowerups = {};
      bird = { x: 80, y: 300, width: 40, height: 35, gravity: 0.4, lift: -9, velocity: 0, rotation: 0, hasDoubleJump: false, hasShield: false, ghostMode: false, fireTrail: false };
      pipes = [];
      coinItems = [];
      powerups = [];
      projectiles = [];
      playerProjectiles = [];
      boss = null;
      bossActive = false;
      bossTimer = 0;
      document.getElementById('attackBtn').classList.remove('visible');
      initBackgrounds();
      startAmbientForMap();
      hideAllScreens();
    }
    
    function gameOver() {
      gameState = 'gameover';
      stopAllAmbient();
      saveCoins();
      if (score > highScore) { highScore = score; localStorage.setItem('flappyHighScore', highScore); }
      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalCoins').textContent = coins;
      document.getElementById('highScore').textContent = highScore;
      document.getElementById('gameOverScreen').classList.add('active');
    }
    
    function hideAllScreens() {
      document.querySelectorAll('.menu-overlay, .grid-screen, .gameover-overlay').forEach(s => s.classList.remove('active'));
    }
    
    function updateCoinDisplay() {
      document.getElementById('menuCoins').textContent = coins;
    }
    
    function showMenu() { hideAllScreens(); updateCoinDisplay(); document.getElementById('menuScreen').classList.add('active'); }
    function showCharScreen() { hideAllScreens(); document.getElementById('charScreen').classList.add('active'); renderCharGrid(); }
    function showMapScreen() { hideAllScreens(); document.getElementById('mapScreen').classList.add('active'); renderMapGrid(); }
    function showStoreScreen() { hideAllScreens(); document.getElementById('storeScreen').classList.add('active'); renderStoreGrid(); }
    function showUpgradesScreen() { hideAllScreens(); document.getElementById('upgradesScreen').classList.add('active'); renderUpgradesGrid(); }
    
    function renderCharGrid() {
      const g = document.getElementById('charGrid');
      g.innerHTML = '';
      characters.forEach((c, i) => {
        const d = document.createElement('div');
        d.className = 'grid-item' + (selectedChar === i ? ' selected' : '') + (highScore < c.unlock ? ' locked' : '');
        d.style.background = c.color.includes('gradient') ? 'linear-gradient(45deg,#FF6B6B,#4ECDC4,#FFD93D)' : c.color;
        d.innerHTML = `
          <div style="font-size:28px;">${c.icon}</div>
          <div style="color:#fff;font-size:10px;font-weight:600;">${c.name}</div>
          ${c.unlock > 0 ? '<div style="color:#aaa;font-size:8px;">Score: ' + c.unlock + '</div>' : ''}
        `;
        if (highScore >= c.unlock || c.unlock === 0) d.onclick = function() { selectedChar = i; renderCharGrid(); };
        g.appendChild(d);
      });
    }
    
    function renderMapGrid() {
      const g = document.getElementById('mapGrid');
      g.innerHTML = '';
      maps.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'grid-item' + (selectedMap === i ? ' selected' : '');
        d.innerHTML = m.icon;
        d.style.background = 'linear-gradient(180deg,' + m.sky[0] + ',' + m.sky[2] + ')';
        d.title = m.name;
        d.onclick = function() { selectedMap = i; initBackgrounds(); renderMapGrid(); };
        g.appendChild(d);
      });
    }
    
    // Store items
    const storeItems = [
      { id: 'scoreBonus', name: 'Score Bonus', icon: '⭐', desc: '+50 Points', cost: 20, type: 'instant' },
      { id: 'coinMagnet', name: 'Coin Magnet', icon: '🧲', desc: 'Attract coins', cost: 25, type: 'duration', duration: 10 },
      { id: 'autoJump', name: 'Auto-Jump', icon: '⚡', desc: 'Auto jump 5s', cost: 25, type: 'duration', duration: 5 },
      { id: 'miniBird', name: 'Mini Bird', icon: '🐦', desc: '50% smaller 8s', cost: 25, type: 'duration', duration: 8 },
      { id: 'pipeFreeze', name: 'Pipe Freeze', icon: '❄️', desc: 'Freeze pipes 3s', cost: 25, type: 'duration', duration: 3 },
      { id: 'ghostMode', name: 'Ghost Mode', icon: '👻', desc: 'Pass through', cost: 30, type: 'duration', duration: 5 },
      { id: 'speedBoost', name: 'Speed Boost', icon: '🚀', desc: 'Faster points', cost: 30, type: 'duration', duration: 10 },
      { id: 'extraLife', name: 'Extra Life', icon: '❤️', desc: '+1 Shield', cost: 30, type: 'instant' },
      { id: 'coinRain', name: 'Coin Rain', icon: '💰', desc: 'Spawn coins', cost: 40, type: 'instant' },
      { id: 'fireTrail', name: 'Fire Trail', icon: '🔥', desc: 'Destroy pipes', cost: 50, type: 'duration', duration: 8 }
    ];
    
    // Upgrades
    const upgrades = [
      { id: 'attack', name: 'Attack Power', icon: '⚔️', desc: '+5 Damage', maxLevel: 5, cost: 15 },
      { id: 'jump', name: 'Jump Boost', icon: '🦘', desc: '+Jump Height', maxLevel: 5, cost: 15 },
      { id: 'projSpeed', name: 'Proj. Speed', icon: '💨', desc: '+Shot Speed', maxLevel: 5, cost: 15 }
    ];
    
    let upgradeLevels = JSON.parse(localStorage.getItem('flappyUpgrades')) || { attack: 0, jump: 0, projSpeed: 0 };
    
    function renderStoreGrid() {
      const g = document.getElementById('storeGrid');
      g.innerHTML = '';
      
      const defaultItems = [
        { id: 'shield', name: 'Shield', icon: '🛡️', desc: 'Block 1 hit', cost: 0 },
        { id: 'double', name: 'Double Jump', icon: '🦅', desc: 'Jump twice', cost: 0 }
      ];
      
      defaultItems.forEach(item => {
        const isEquipped = equippedPowerups.includes(item.id);
        const d = document.createElement('div');
        d.className = 'grid-item';
        d.style.background = 'linear-gradient(145deg, #2a2a4a, #1a1a2e)';
        d.innerHTML = `
          <div style="font-size:28px;">${item.icon}</div>
          <div style="color:#fff;font-size:10px;font-weight:600;margin-top:2px;">${item.name}</div>
          <div style="color:#aaa;font-size:8px;">${item.desc}</div>
          <div style="margin-top:4px;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:bold;${isEquipped ? 'background:#4CAF50;color:#fff;' : 'background:#666;color:#ccc;cursor:pointer;'}">${isEquipped ? 'EQUIPPED' : 'EQUIP'}</div>
        `;
        d.onclick = function() { togglePowerup(item.id); };
        g.appendChild(d);
      });
      
      storeItems.forEach((item, i) => {
        const isOwned = ownedPowerups[item.id];
        const isEquipped = equippedPowerups.includes(item.id);
        const d = document.createElement('div');
        d.className = 'grid-item';
        d.style.background = 'linear-gradient(145deg, #2a2a4a, #1a1a2e)';
        
        let statusHTML = '';
        if (isOwned) {
          statusHTML = `<div style="margin-top:4px;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:bold;${isEquipped ? 'background:#4CAF50;color:#fff;' : 'background:#666;color:#ccc;cursor:pointer;'}">${isEquipped ? 'EQUIPPED' : 'EQUIP'}</div>`;
        } else {
          statusHTML = `<div style="color:#FFD700;font-size:10px;font-weight:bold;margin-top:2px;">💰 ${item.cost}</div>`;
        }
        
        d.innerHTML = `
          <div style="font-size:28px;">${item.icon}</div>
          <div style="color:#fff;font-size:10px;font-weight:600;margin-top:2px;">${item.name}</div>
          <div style="color:#aaa;font-size:8px;">${item.desc}</div>
          ${statusHTML}
        `;
        d.onclick = function() { isOwned ? togglePowerup(item.id) : buyStoreItem(item); };
        g.appendChild(d);
      });
    }
    
    function renderUpgradesGrid() {
      const g = document.getElementById('upgradesGrid');
      g.innerHTML = '';
      upgrades.forEach((u, i) => {
        const level = upgradeLevels[u.id] || 0;
        const d = document.createElement('div');
        d.className = 'grid-item';
        d.style.background = 'linear-gradient(145deg, #2a2a4a, #1a1a2e)';
        d.innerHTML = `
          <div style="font-size:28px;">${u.icon}</div>
          <div style="color:#fff;font-size:11px;font-weight:600;">${u.name}</div>
          <div style="color:#aaa;font-size:9px;">${u.desc}</div>
          <div style="display:flex;gap:2px;margin-top:3px;">
            ${Array(u.maxLevel).fill(0).map((_,j) => `<span style="color:${j<level?'#4CAF50':'#555'}">★</span>`).join('')}
          </div>
          <div style="color:#FFD700;font-size:10px;font-weight:bold;">${level >= u.maxLevel ? 'MAX' : '💰 ' + u.cost}</div>
        `;
        d.onclick = function() { buyUpgrade(u); };
        g.appendChild(d);
      });
    }
    
    function buyStoreItem(item) {
      if (ownedPowerups[item.id]) {
        showNotify('Already owned!');
        return;
      }
      if (coins >= item.cost) {
        coins -= item.cost;
        saveCoins();
        ownedPowerups[item.id] = true;
        equippedPowerups.push(item.id);
        savePowerups();
        showNotify(`${item.name} unlocked!`);
        renderStoreGrid();
      } else {
        showNotify('Not enough coins!');
      }
    }
    
    function togglePowerup(itemId) {
      if (!ownedPowerups[itemId]) return;
      
      const idx = equippedPowerups.indexOf(itemId);
      if (idx > -1) {
        equippedPowerups.splice(idx, 1);
        savePowerups();
        renderStoreGrid();
      } else {
        if (equippedPowerups.length >= 3) {
          showNotify('Max 3 equipped - unselect one first!');
          return;
        }
        equippedPowerups.push(itemId);
        savePowerups();
        renderStoreGrid();
      }
    }
    
    function buyUpgrade(u) {
      const level = upgradeLevels[u.id] || 0;
      if (level >= u.maxLevel) {
        showNotify('Already max level!');
        return;
      }
      if (coins >= u.cost) {
        coins -= u.cost;
        saveCoins();
        upgradeLevels[u.id] = level + 1;
        localStorage.setItem('flappyUpgrades', JSON.stringify(upgradeLevels));
        showNotify(`${u.name} upgraded!`);
        renderUpgradesGrid();
      } else {
        showNotify('Not enough coins!');
      }
    }
    
    function gameLoop() {
      ctx.clearRect(0, 0, 400, 600);
      if (gameState === 'playing' || gameState === 'gameover') {
        drawBackground();
        if (gameState === 'playing') updatePipeParticles();
        drawPipes();
        drawCoins();
        drawPowerups();
        drawBoss();
        drawProjectiles();
        drawPlayerProjectiles();
        if (gameState === 'playing') update();
        drawCharacter(ctx, bird.x + bird.width / 2, bird.y + bird.height / 2, 35, selectedChar, bird.rotation);
        drawParticles();
        drawHUD();
      } else if (gameState === 'menu') {
        const map = maps[selectedMap];
        const g = ctx.createLinearGradient(0, 0, 0, 600);
        g.addColorStop(0, map.sky[0]);
        g.addColorStop(1, map.sky[1]);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 400, 600);
        ctx.fillStyle = map.ground;
        ctx.fillRect(0, 550, 400, 50);
        ctx.fillStyle = map.grass;
        ctx.fillRect(0, 550, 400, 15);
      }
      requestAnimationFrame(gameLoop);
    }
    
    initBackgrounds();
    gameLoop();
    
    window.showMenu = showMenu;
    window.showCharScreen = showCharScreen;
    window.showMapScreen = showMapScreen;
    window.startGame = startGame;
  </script>
</body>
</html>
