<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird - Enhanced Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); font-family: 'Nunito', sans-serif; overflow: hidden; }
    #gameContainer { 
      position: relative; 
      width: 450px; 
      height: 675px;
      overflow: hidden;
    }
    canvas { display: block; }
    
    /* Header with coins */
    .header-bar { position: absolute; top: 0; left: 0; right: 0; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 60; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%); }
    .coin-display { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; }
    .coin-display span { font-size: 18px; }
    .coin-display font { color: #FFD700; font-weight: bold; font-size: 16px; }
    
    .sound-toggle { background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    
    .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); z-index: 50; padding: 20px; }
    .menu-overlay.active { display: flex; }
    
    /* Animated background elements */
    .menu-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
    .menu-bg .cloud { position: absolute; opacity: 0.1; animation: float 20s infinite linear; }
    .menu-bg .cloud:nth-child(1) { top: 10%; left: -50px; font-size: 60px; animation-duration: 25s; }
    .menu-bg .cloud:nth-child(2) { top: 40%; left: -50px; font-size: 40px; animation-duration: 30s; animation-delay: -10s; }
    .menu-bg .cloud:nth-child(3) { top: 70%; left: -50px; font-size: 50px; animation-duration: 28s; animation-delay: -5s; }
    @keyframes float { from { transform: translateX(-50px); } to { transform: translateX(450px); } }
    
    /* Logo section */
    .logo-section { text-align: center; margin-bottom: 25px; position: relative; z-index: 1; }
    .logo-icon { font-size: 80px; animation: bounce 2s ease-in-out infinite; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .logo-title { font-family: 'Fredoka One', cursive; font-size: 38px; color: #FFD93D; text-shadow: 3px 3px 0 #FF6B6B, 6px 6px 0 rgba(0,0,0,0.2); margin-top: 10px; letter-spacing: 2px; }
    .logo-subtitle { color: #4ECDC4; font-size: 14px; font-weight: 600; margin-top: 5px; text-transform: uppercase; letter-spacing: 3px; }
    
    /* Play button */
    .play-btn { background: linear-gradient(180deg, #FFD93D 0%, #FF9F1C 100%); color: #1a1a2e; border: none; padding: 18px 60px; font-size: 24px; font-family: 'Fredoka One', cursive; border-radius: 50px; cursor: pointer; margin: 15px 0 25px 0; box-shadow: 0 8px 0 #E0890F, 0 15px 30px rgba(0,0,0,0.3); transition: all 0.1s; position: relative; z-index: 1; }
    .play-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #E0890F, 0 20px 40px rgba(0,0,0,0.3); }
    . transform: translateYplay-btn:active {(4px); box-shadow: 0 4px 0 #E0890F, 0 8px 20px rgba(0,0,0,0.3); }
    
    /* Menu grid */
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 320px; position: relative; z-index: 1; }
    .menu-card { background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px 10px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; backdrop-filter: blur(10px); }
    .menu-card:hover { background: linear-gradient(145deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.1) 100%); border-color: rgba(255,255,255,0.3); transform: translateY(-3px); }
    .menu-card:active { transform: translateY(0); }
    .menu-card .icon { font-size: 32px; }
    .menu-card .label { color: #fff; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Character & Map cards with colors */
    .menu-card.characters { border-color: rgba(255,217,61,0.3); }
    .menu-card.characters:hover { border-color: #FFD93D; }
    .menu-card.maps { border-color: rgba(78,205,196,0.3); }
    .menu-card.maps:hover { border-color: #4ECDC4; }
    .menu-card.store { border-color: rgba(255,107,107,0.3); }
    .menu-card.store:hover { border-color: #FF6B6B; }
    .menu-card.upgrades { border-color: rgba(155,89,182,0.3); }
    .menu-card.upgrades:hover { border-color: #9B59B6; }
    
    /* Instructions */
    .instructions { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 25px; text-align: center; position: relative; z-index: 1; }
    .instructions kbd { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; margin: 0 2px; }
    
    /* Grid screens */
    .grid-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); z-index: 55; padding: 60px 20px 20px; }
    .grid-screen.active { display: flex; }
    .screen-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: #FFD93D; text-align: center; margin-bottom: 20px; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
    .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; overflow-y: auto; }
    .grid-item { border-radius: 12px; cursor: pointer; border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; transition: all 0.2s; min-height: 80px; }
    .grid-item:hover { transform: scale(1.05); }
    .grid-item.selected { border-color: #FFD93D; box-shadow: 0 0 20px rgba(255,217,61,0.5); }
    .grid-item.locked { opacity: 0.5; cursor: not-allowed; }
    .grid-item.locked:hover { transform: none; }
    .grid-item .icon { font-size: 32px; margin-bottom: 5px; }
    .grid-item .name { color: #fff; font-size: 11px; font-weight: 600; text-align: center; }
    .grid-item .unlock { color: #aaa; font-size: 9px; margin-top: 3px; }
    
    .back-btn { background: linear-gradient(180deg, #FF6B6B 0%, #EE5A5A 100%); color: white; border: none; padding: 12px 40px; font-size: 16px; font-family: 'Fredoka One', cursive; border-radius: 50px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #C44545; }
    .back-btn:hover { transform: translateY(-2px); }
    .back-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #C44545; }
    
    /* Game over screen */
    .gameover-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 60; }
    .gameover-overlay.active { display: flex; }
    .gameover-title { font-family: 'Fredoka One', cursive; font-size: 42px; color: #FF6B6B; text-shadow: 3px 3px 0 #C44545; }
    .gameover-score { font-family: 'Fredoka One', cursive; font-size: 48px; color: #FFD93D; margin: 15px 0; }
    .gameover-stats { color: #fff; font-size: 16px; margin-bottom: 20px; text-align: center; }
    .gameover-stats div { margin: 5px 0; }
    .gameover-btns { display: flex; flex-direction: column; gap: 10px; }
    .revive-btn { background: linear-gradient(180deg, #4CAF50 0%, #388E3C 100%); color: white; border: none; padding: 14px 30px; font-size: 16px; font-family: 'Fredoka One', cursive; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #2E7D32; }
    .revive-btn:hover { transform: translateY(-2px); }
    
    .powerup-notify { display: none; position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: linear-gradient(90deg,#667eea,#764ba2); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 700; z-index: 70; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    
    /* Attack button for mobile */
    .attack-btn { 
      display: none; 
      position: absolute; 
      bottom: 80px; 
      right: 20px; 
      background: linear-gradient(180deg, #FF6B6B 0%, #D32F2F 100%); 
      color: white; 
      border: none; 
      padding: 15px 30px; 
      font-size: 18px; 
      font-family: 'Fredoka One', cursive; 
      border-radius: 15px; 
      cursor: pointer; 
      z-index: 65; 
      box-shadow: 0 4px 0 #B71C1C, 0 6px 15px rgba(0,0,0,0.3); 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .attack-btn:active { 
      transform: translateY(3px); 
      box-shadow: 0 1px 0 #B71C1C, 0 2px 8px rgba(0,0,0,0.3); 
    }
    .attack-btn.visible { 
      display: block; 
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <!-- Attack button for mobile (shown during boss fight) -->
    <button class="attack-btn" id="attackBtn" onclick="initAudio(); handleAttack();">ATTACK</button>
    
    <!-- Header with coins -->
    <div class="header-bar">
      <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
      <div class="coin-display">
        <span>💰</span>
        <font id="menuCoins">0</font>
      </div>
    </div>
    
    <!-- Main Menu Screen -->
    <div id="menuScreen" class="menu-overlay active">
      <div class="menu-bg">
        <div class="cloud">☁️</div>
        <div class="cloud">☁️</div>
        <div class="cloud">☁️</div>
      </div>
      
      <div class="logo-section">
        <div class="logo-icon">🐤</div>
        <div class="logo-title">FLAPPY BIRD</div>
        <div class="logo-subtitle">Enhanced Edition</div>
      </div>
      
      <button class="play-btn" onclick="startGame()">▶ PLAY</button>
      
      <div class="menu-grid">
        <div class="menu-card characters" onclick="showCharScreen()">
          <div class="icon">🐦</div>
          <div class="label">Characters</div>
        </div>
        <div class="menu-card maps" onclick="showMapScreen()">
          <div class="icon">🗺️</div>
          <div class="label">Maps</div>
        </div>
        <div class="menu-card store" onclick="showStoreScreen()">
          <div class="icon">🏪</div>
          <div class="label">Store</div>
        </div>
        <div class="menu-card upgrades" onclick="showUpgradesScreen()">
          <div class="icon">⚙️</div>
          <div class="label">Upgrades</div>
        </div>
      </div>
      
      <div class="instructions">
        <kbd>SPACE</kbd> to Jump &nbsp;|&nbsp; <kbd>X</kbd> to Attack Boss
      </div>
    </div>
    
    <!-- Characters Screen -->
    <div id="charScreen" class="grid-screen">
      <div class="screen-title">SELECT BIRD</div>
      <div id="charGrid" class="grid-container"></div>
      <button class="back-btn" onclick="showMenu()">← BACK</button>
    </div>
    
    <!-- Maps Screen -->
    <div id="mapScreen" class="grid-screen">
      <div class="screen-title">SELECT MAP</div>
      <div id="mapGrid" class="grid-container"></div>
      <button class="back-btn" onclick="showMenu()">← BACK</button>
    </div>
    
    <!-- Store Screen -->
    <div id="storeScreen" class="grid-screen">
      <div class="screen-title">🏪 STORE</div>
      <div id="storeGrid" class="grid-container"></div>
      <button class="back-btn" onclick="showMenu()">← BACK</button>
    </div>
    
    <!-- Upgrades Screen -->
    <div id="upgradesScreen" class="grid-screen">
      <div class="screen-title">⚙️ UPGRADES</div>
      <div id="upgradesGrid" class="grid-container"></div>
      <button class="back-btn" onclick="showMenu()">← BACK</button>
    </div>
    
    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="gameover-overlay">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-score" id="finalScore">0</div>
      <div class="gameover-stats">
        <div>💰 Coins: <span id="finalCoins">0</span></div>
        <div>🏆 Best: <span id="highScore">0</span></div>
      </div>
      <div class="gameover-btns">
        <button class="revive-btn" id="reviveBtn" onclick="reviveGame()">💚 REVIVE (5 💰)</button>
        <button class="back-btn" onclick="showMenu()">MENU</button>
      </div>
      <button class="play-btn" style="margin-top:10px;padding:12px 40px;font-size:18px;" onclick="startGame()">PLAY AGAIN</button>
    </div>
    
    <div id="powerupNotify" class="powerup-notify"></div>
  </div>
  <script>
    // ==================== SOUND SYSTEM ====================
    let soundEnabled = true;
    let audioCtx = null;
    let ambientSounds = {};
    
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
    }
    
    function playJump() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
    
    function playCoin() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
    
    function playShoot() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
    
    function playDeath() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
    
    function playScore() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
    
    function playPowerup() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(500, audioCtx.currentTime);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
    
    function playBoss() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.2);
      osc.frequency.setValueAtTime(100, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
    }
    
    function playBossDefeat() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }
    
    function playChirp() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(2000 + Math.random() * 1000, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
    
    function stopAllAmbient() {
      Object.values(ambientSounds).forEach(s => clearInterval(s));
      ambientSounds = {};
    }
    
    function startAmbientForMap() {
      stopAllAmbient();
      if (selectedMap === 2) { // Space - low drone
        if (!ambientSounds.space) {
          ambientSounds.space = setInterval(() => { if(Math.random() > 0.7) playChirp(); }, 2000);
        }
      } else if (selectedMap === 4) { // Junkyard - metallic clanks
        if (!ambientSounds.junkyard) {
          ambientSounds.junkyard = setInterval(() => { if(Math.random() > 0.7) playChirp(); }, 1500);
        }
      } else if (selectedMap === 5) { // Cyberpunk - neon buzz
        if (!ambientSounds.cyberpunk) {
          ambientSounds.cyberpunk = setInterval(() => { if(Math.random() > 0.7) playChirp(); }, 1200);
        }
      } else if (selectedMap === 6) { // Forest - birds
        if (!ambientSounds.forest) {
          ambientSounds.forest = setInterval(() => { if(Math.random() > 0.6) playChirp(); }, 1500);
        }
      }
    }
    
    // ==================== GAME DATA ====================
    const characters = [
      { name: 'Classic', icon: '🐤', color: '#FFD93D', unlock: 0 },
      { name: 'Red Parrot', icon: '🦜', color: '#E53935', unlock: 10 },
      { name: 'Eagle', icon: '🦅', color: '#8D6E63', unlock: 25 },
      { name: 'Owl', icon: '🦉', color: '#78909C', unlock: 50 },
      { name: 'Phoenix', icon: '🔥', color: '#FF5722', unlock: 100 },
      { name: 'Golden Eagle', icon: '🌟', color: '#FFD700', unlock: 200 }
    ];
    
    const maps = [
      { name: 'Normal', sky: ['#87CEEB', '#E0F7FA', '#4FC3F7'], ground: '#8D6E63', grass: '#4CAF50', pipe: '#4CAF50', icon: '🌳' },
      { name: 'Snow', sky: ['#B3E5FC', '#E1F5FE', '#81D4FA'], ground: '#ECEFF1', grass: '#B0BEC5', pipe: '#90CAF9', icon: '❄️' },
      { name: 'Space', sky: ['#1a1a2e', '#16213e', '#0f3460'], ground: '#37474F', grass: '#546E7A', pipe: '#7E57C2', neon: true, icon: '🚀' },
      { name: 'Underwater', sky: ['#006064', '#0097A7', '#00BCD4'], ground: '#5D4037', grass: '#00695C', pipe: '#FF9800', icon: '🐠' },
      { name: 'Junkyard', sky: ['#5D4037', '#795548', '#8D6E63'], ground: '#3E2723', grass: '#4E342E', pipe: '#795548', icon: '🔧' },
      { name: 'Cyberpunk', sky: ['#1a1a2e', '#311B92', '#4A148C'], ground: '#263238', grass: '#37474F', neon: true, pipe: '#E91E63', icon: '🌆' },
      { name: 'Forest', sky: ['#A5D6A7', '#C8E6C9', '#81C784'], ground: '#5D4037', grass: '#388E3C', pipe: '#8D6E63', icon: '🌲' }
    ];
    
    const powerupTypes = ['shield', 'double', 'scoreBonus', 'coinMagnet', 'autoJump', 'miniBird', 'pipeFreeze', 'ghostMode', 'speedBoost', 'extraLife', 'coinRain', 'fireTrail'];
    
    // ==================== GAME STATE ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    window.addEventListener('beforeunload', () => {
      saveCoins();
    });
    
    let gameState = 'menu';
    let frame = 0;
    let score = 0;
    let coins = parseInt(localStorage.getItem('flappyCoins')) || 0;
    let highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
    let gameSpeed = 2;

    let pipes = [];

    let equippedPowerups = JSON.parse(localStorage.getItem('flappyEquippedPowerups')) || ['shield', 'double'];

    const pipeWidth = 60;
    
    // ==================== MAPS & BACKGROUNDS ====================
    function initBackgrounds() {
      bgElements = [];
      if (selectedMap === 0) { // Normal - clouds, hills
        for (let i = 0; i < 5; i++) bgElements.push({ type: 'cloud', x: Math.random() * 400, y: 50 + Math.random() * 150, speed: 0.3 + Math.random() * 0.3, size: 30 + Math.random() * 30 });
        for (let i = 0; i < 3; i++) bgElements.push({ type: 'hill', x: i * 150, size: 80 + Math.random() * 40 });
      } else if (selectedMap === 1) { // Snow - snowflakes
        for (let i = 0; i < 30; i++) bgElements.push({ type: 'snowflake', x: Math.random() * 400, y: Math.random() * 600, speed: 0.5 + Math.random() * 1, size: 2 + Math.random() * 3 });
      } else if (selectedMap === 2) { // Space - stars
        for (let i = 0; i < 50; i++) bgElements.push({ type: 'star', x: Math.random() * 400, y: Math.random() * 500, size: 1 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2 });
      } else if (selectedMap === 3) { // Underwater - bubbles, seaweed
        for (let i = 0; i < 15; i++) bgElements.push({ type: 'bubble', x: Math.random() * 400, y: Math.random() * 600, speed: 0.3 + Math.random() * 0.5, size: 3 + Math.random() * 5 });
        for (let i = 0; i < 8; i++) bgElements.push({ type: 'seaweed', x: i * 60 + Math.random() * 20, wave: Math.random() * Math.PI * 2 });
      } else if (selectedMap === 4) { // Junkyard - debris
        for (let i = 0; i < 8; i++) bgElements.push({ type: 'debris', x: Math.random() * 400, y: 500 + Math.random() * 50, size: 10 + Math.random() * 20 });
      } else if (selectedMap === 5) { // Cyberpunk - neon signs
        for (let i = 0; i < 3; i++) bgElements.push({ type: 'neon', x: 50 + i * 120, y: 100 + Math.random() * 200, text: ['广告', 'SHOP', 'OPEN'][i], color: ['#FF4081', '#00E5FF', '#FFEA00'][i] });
      } else if (selectedMap === 6) { // Forest - trees, birds
        for (let i = 0; i < 6; i++) bgElements.push({ type: 'tree', x: i * 80 - 20, height: 150 + Math.random() * 100 });
        for (let i = 0; i < 3; i++) bgElements.push({ type: 'bird', x: Math.random() * 400, y: 50 + Math.random() * 200, speed: 0.5 + Math.random() * 0.5, direction: Math.random() > 0.5 ? 1 : -1 });
      }
    }
    
    function drawBackground() {
      const map = maps[selectedMap];
      const g = ctx.createLinearGradient(0, 0, 0, 600);
      g.addColorStop(0, map.sky[0]);
      g.addColorStop(0.7, map.sky[1]);
      g.addColorStop(1, map.sky[2]);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 400, 600);
      
      bgElements.forEach(e => {
        if (e.type === 'cloud') {
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.arc(e.x + e.size * 0.7, e.y - e.size * 0.3, e.size * 0.7, 0, Math.PI * 2);
          ctx.arc(e.x + e.size * 1.2, e.y, e.size * 0.8, 0, Math.PI * 2);
          ctx.fill();
          e.x -= e.speed;
          if (e.x < -100) e.x = 450;
        } else if (e.type === 'snowflake') {
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fill();
          e.x += Math.sin(frame * 0.02 + e.y) * 0.3;
          e.y += e.speed;
          if (e.y > 600) { e.y = -5; e.x = Math.random() * 400; }
        } else if (e.type === 'star') {
          ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(frame * 0.05 + e.twinkle) * 0.5})`;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.type === 'bubble') {
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.stroke();
          e.y -= e.speed;
          e.x += Math.sin(frame * 0.03 + e.y * 0.01) * 0.3;
          if (e.y < -10) { e.y = 610; e.x = Math.random() * 400; }
        } else if (e.type === 'seaweed') {
          ctx.strokeStyle = '#2E7D32';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(e.x, 600);
          for (let y = 600; y > 500; y -= 5) {
            ctx.lineTo(e.x + Math.sin((y + frame * 2) * 0.05 + e.wave) * 10, y);
          }
          ctx.stroke();
        } else if (e.type === 'hill') {
          ctx.fillStyle = map.grass;
          ctx.beginPath();
          ctx.arc(e.x, 580, e.size, Math.PI, 0);
          ctx.fill();
        } else if (e.type === 'debris') {
          ctx.fillStyle = '#4E342E';
          ctx.fillRect(e.x, e.y, e.size, e.size * 0.6);
        } else if (e.type === 'neon') {
          ctx.font = '20px Arial';
          ctx.fillStyle = e.color;
          ctx.shadowColor = e.color;
          ctx.shadowBlur = 10 + Math.sin(frame * 0.1) * 5;
          ctx.fillText(e.text, e.x, e.y);
          ctx.shadowBlur = 0;
        } else if (e.type === 'tree') {
          ctx.fillStyle = '#5D4037';
          ctx.fillRect(e.x, 550 - e.height * 0.3, 15, e.height * 0.3);
          ctx.fillStyle = '#388E3C';
          ctx.beginPath();
          ctx.arc(e.x + 7, 550 - e.height * 0.5, e.height * 0.4, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.type === 'bird') {
          ctx.fillStyle = '#333';
          ctx.font = '20px Arial';
          ctx.fillText('🐦', e.x, e.y);
          e.x += e.speed * e.direction;
          if (e.x < -20 || e.x > 420) e.direction *= -1;
        }
      });
      
      // Ground
      ctx.fillStyle = map.ground;
      ctx.fillRect(0, 550, 400, 50);
      ctx.fillStyle = map.grass;
      ctx.fillRect(0, 550, 400, 15);
    }
    
    // ==================== GAME LOGIC ====================
    function getGapSize() {
      if (score < 50) return 150;
      if (score < 100) return 130;
      if (score < 150) return 115;
      if (score < 200) return 100;
      return 85;
    }
    
    function getHorizontalGap() {
      if (score < 50) return 180;
      if (score < 100) return 170;
      if (score < 150) return 160;
      if (score < 200) return 150;
      return 140;
    }
    
    function updatePipeParticles() {
      pipes.forEach(p => {
        if (selectedMap === 1 && Math.random() > 0.95) { // Snow - water drips
          pipeParticles.push({ x: p.x + Math.random() * pipeWidth, y: p.top - 10, vx: (Math.random() - 0.5) * 0.5, vy: 1 + Math.random(), size: 2 + Math.random() * 2, type: 'drip', life: 60 });
        }
        if (selectedMap === 3 && Math.random() > 0.92) { // Underwater - bubbles
          pipeParticles.push({ x: p.x + Math.random() * pipeWidth, y: p.top + Math.random() * 50, vx: (Math.random() - 0.5) * 0.3, vy: -0.5 - Math.random() * 0.5, size: 3 + Math.random() * 3, type: 'pipeBubble', life: 40 });
        }
        if (selectedMap === 4 && Math.random() > 0.97) { // Junkyard - sparks
          pipeParticles.push({ x: p.x + Math.random() * pipeWidth, y: p.top + Math.random() * 30, vx: (Math.random() - 0.5) * 3, vy: -1 - Math.random() * 2, size: 2 + Math.random() * 2, type: 'spark', life: 20 });
        }
        if (selectedMap === 5 && Math.random() > 0.93) { // Cyberpunk - electric
          pipeParticles.push({ x: p.x + Math.random() * pipeWidth, y: p.top + Math.random() * 40, vx: (Math.random() - 0.5) * 2, vy: -0.5, size: 3, type: 'electric', life: 15 });
        }
        if (selectedMap === 6 && Math.random() > 0.94) { // Forest - falling leaves
          pipeParticles.push({ x: p.x + Math.random() * pipeWidth, y: p.top - 5, vx: (Math.random() - 0.5) * 0.5, vy: 0.5 + Math.random() * 0.5, swayOffset: Math.random() * Math.PI * 2, swaySpeed: 0.05 + Math.random() * 0.03, rotation: Math.random() * Math.PI * 2, rotationSpeed: (Math.random() - 0.5) * 0.1, size: 4 + Math.random() * 3, type: 'leaf', life: 80, leafColor: ['#FF6B35', '#F7C59F', '#E85D04', '#9D4EDD'][Math.floor(Math.random() * 4)] });
        }
      });
      
      // Ambient particles
      if (selectedMap === 2 && Math.random() > 0.9) {
        pipeParticles.push({ x: Math.random() * 400, y: 600, vx: (Math.random() - 0.5) * 0.3, vy: -0.3 - Math.random() * 0.3, size: 1 + Math.random() * 2, type: 'spaceParticle', life: 100 + Math.random() * 50, color: Math.random() > 0.5 ? '#B39DDB' : '#CE93D8' });
      }
      
      const maxParticles = 30;
      if (pipeParticles.length > maxParticles) pipeParticles = pipeParticles.slice(-maxParticles);
      
      pipeParticles = pipeParticles.filter(pt => {
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.life--;
        
        ctx.globalAlpha = pt.life / 20;
        
        if (pt.type === 'drip') {
          ctx.fillStyle = 'rgba(173, 216, 230, 0.8)';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (pt.type === 'pipeBubble') {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.stroke();
        } else if (pt.type === 'spark') {
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255, 200, 0, 0.5)';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size * 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (pt.type === 'electric') {
          ctx.fillStyle = '#00FFFF';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size * 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (pt.type === 'leaf') {
          ctx.save();
          ctx.translate(pt.x, pt.y);
          ctx.rotate(pt.rotation);
          ctx.fillStyle = pt.leafColor;
          ctx.beginPath();
          ctx.ellipse(0, 0, pt.size, pt.size * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.3)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(-pt.size * 0.5, 0);
          ctx.lineTo(pt.size * 0.5, 0);
          ctx.stroke();
          ctx.restore();
          pt.rotation += pt.rotationSpeed;
          if (pt.swayOffset !== undefined) pt.vx = Math.sin(pt.swayOffset + pt.swaySpeed * (80 - pt.life)) * 0.5;
        } else if (pt.type === 'spaceParticle') {
          ctx.fillStyle = pt.color || '#B39DDB';
          ctx.globalAlpha = pt.life / 40;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.globalAlpha = 1;
        return pt.life > 0;
      });
    }
    
    function drawPipes() {
      const map = maps[selectedMap];
      const currentPipeGap = getGapSize();
      
      pipes.forEach(p => {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(p.x + 5, 0, pipeWidth + 5, p.top + 10);
        ctx.fillRect(p.x + 5, 600 - p.bottom - 10, pipeWidth + 5, p.bottom + 10);
        
        // Main pipe body with gradient
        const pg = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0);
        
        if (selectedMap === 0) { // Normal - Green metallic
          pg.addColorStop(0, '#2E7D32'); pg.addColorStop(0.3, '#4CAF50'); pg.addColorStop(0.7, '#388E3C'); pg.addColorStop(1, '#1B5E20');
        } else if (selectedMap === 1) { // Snow - Ice blue
          pg.addColorStop(0, '#90CAF9'); pg.addColorStop(0.3, '#B3E5FC'); pg.addColorStop(0.7, '#81D4FA'); pg.addColorStop(1, '#64B5F6');
        } else if (selectedMap === 2) { // Space - Purple metallic
          pg.addColorStop(0, '#5E35B1'); pg.addColorStop(0.3, '#7E57C2'); pg.addColorStop(0.7, '#673AB7'); pg.addColorStop(1, '#512DA8');
        } else if (selectedMap === 3) { // Underwater - Coral orange
          pg.addColorStop(0, '#E65100'); pg.addColorStop(0.3, '#FF9800'); pg.addColorStop(0.7, '#F57C00'); pg.addColorStop(1, '#E64A19');
        } else if (selectedMap === 4) { // Junkyard - Rusty brown
          pg.addColorStop(0, '#5D4037'); pg.addColorStop(0.3, '#795548'); pg.addColorStop(0.7, '#6D4C41'); pg.addColorStop(1, '#4E342E');
        } else if (selectedMap === 5) { // Cyberpunk - Neon magenta
          pg.addColorStop(0, '#C2185B'); pg.addColorStop(0.3, '#E91E63'); pg.addColorStop(0.7, '#D81B60'); pg.addColorStop(1, '#AD1457');
        } else { // Forest - Wood brown
          pg.addColorStop(0, '#5D4037'); pg.addColorStop(0.3, '#8D6E63'); pg.addColorStop(0.7, '#6D4C41'); pg.addColorStop(1, '#4E342E');
        }
        
        ctx.fillStyle = pg;
        
        // Draw rounded pipes
        const radius = 8;
        ctx.beginPath();
        ctx.roundRect(p.x, 0, pipeWidth, p.top + radius, [0, 0, radius, radius]);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(p.x, 600 - p.bottom - radius, pipeWidth, p.bottom + radius, [radius, radius, 0, 0]);
        ctx.fill();
        
        // Metal bands with rivets
        const bandWidth = 8;
        ctx.fillStyle = selectedMap === 5 ? '#FF4081' : (selectedMap === 1 ? '#E3F2FD' : (selectedMap === 3 ? '#FFB74D' : '#FFD54F'));
        ctx.fillRect(p.x - 2, p.top - 25, pipeWidth + 4, bandWidth);
        ctx.fillRect(p.x - 2, p.top + 15, pipeWidth + 4, bandWidth);
        ctx.fillRect(p.x - 2, 600 - p.bottom - bandWidth - 5, pipeWidth + 4, bandWidth);
        ctx.fillRect(p.x - 2, 600 - p.bottom + 20, pipeWidth + 4, bandWidth);
        
        // Rivets
        ctx.fillStyle = selectedMap === 5 ? '#FF80AB' : (selectedMap === 1 ? '#BBDEFB' : (selectedMap === 3 ? '#FFE0B2' : '#FFECB3'));
        const rivetPositions = [p.x + 10, p.x + pipeWidth - 10];
        rivetPositions.forEach(rx => {
          ctx.beginPath(); ctx.arc(rx, p.top - 21, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(rx, p.top + 19, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(rx, 600 - p.bottom - bandWidth - 2, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(rx, 600 - p.bottom + 23, 3, 0, Math.PI * 2); ctx.fill();
        });
        
        // Pipe caps
        const capWidth = pipeWidth + 12;
        const capX = p.x - 6;
        
        if (selectedMap === 5) {
          ctx.shadowColor = '#FF4081';
          ctx.shadowBlur = 15;
        }
        
        ctx.fillStyle = selectedMap === 5 ? '#E91E63' : (selectedMap === 1 ? '#B3E5FC' : (map.pipe || '#4CAF50'));
        ctx.fillRect(capX, p.top - 28, capWidth, 30);
        ctx.fillRect(capX, 600 - p.bottom - 2, capWidth, 30);
        
        ctx.shadowBlur = 0;
        
        // Highlight on caps
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(capX + 2, p.top - 26, capWidth - 4, 5);
        ctx.fillRect(capX + 2, 600 - p.bottom, capWidth - 4, 5);
        
        // Map-specific effects
        // Normal - Moving metallic shine
        if (selectedMap === 0) {
          const shineX = (frame * 2) % (pipeWidth + 60) - 30;
          const shineGradient = ctx.createLinearGradient(p.x + shineX - 30, 0, p.x + shineX + 30, 0);
          shineGradient.addColorStop(0, 'rgba(255,255,255,0)');
          shineGradient.addColorStop(0.5, 'rgba(255,255,255,0.4)');
          shineGradient.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = shineGradient;
          ctx.fillRect(p.x, 0, pipeWidth, p.top);
          ctx.fillRect(p.x, 600 - p.bottom, pipeWidth, p.bottom);
        }
        
        // Snow - Frost effect
        if (selectedMap === 1) {
          const frostGradientTop = ctx.createLinearGradient(p.x, 0, p.x, 20);
          frostGradientTop.addColorStop(0, 'rgba(255,255,255,0.6)');
          frostGradientTop.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = frostGradientTop;
          ctx.fillRect(p.x, 0, pipeWidth, 20);
          const frostGradientBottom = ctx.createLinearGradient(p.x, 600 - p.bottom, p.x, 600 - p.bottom + 20);
          frostGradientBottom.addColorStop(0, 'rgba(255,255,255,0)');
          frostGradientBottom.addColorStop(1, 'rgba(255,255,255,0.6)');
          ctx.fillStyle = frostGradientBottom;
          ctx.fillRect(p.x, 600 - p.bottom, pipeWidth, 20);
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillRect(capX, p.top - 28, capWidth, 8);
          ctx.fillRect(capX, 600 - p.bottom + 22, capWidth, 8);
        }
        
        // Space - Glow panels
        if (selectedMap === 2) {
          ctx.fillStyle = `rgba(126, 87, 194, ${0.3 + Math.sin(frame * 0.1) * 0.2})`;
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(p.x + 15 + i * 25, p.top - 40, 12, 8);
            ctx.fillRect(p.x + 15 + i * 25, 600 - p.bottom + 32, 12, 8);
          }
          ctx.shadowColor = '#7E57C2';
          ctx.shadowBlur = 12 + Math.sin(frame * 0.08) * 6;
          ctx.strokeStyle = 'rgba(126, 87, 194, 0.6)';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.x, 0, pipeWidth, p.top);
          ctx.strokeRect(p.x, 600 - p.bottom, pipeWidth, p.bottom);
          ctx.shadowBlur = 0;
        }
        
        // Underwater - Seaweed
        if (selectedMap === 3) {
          ctx.strokeStyle = '#2E7D32';
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
            const baseX = p.x + 10 + i * 28;
            const amplitude = 6;
            const frequency = 0.1;
            const speed = frame * 0.05;
            ctx.beginPath();
            for (let y = 10; y <= p.top - 20; y += 5) {
              const sway = Math.sin(y * frequency + speed + i * 1.5) * amplitude * (y / p.top);
              const offsetX = baseX + sway;
              if (y === 10) ctx.moveTo(offsetX, y);
              else ctx.lineTo(offsetX, y);
            }
            ctx.stroke();
            ctx.beginPath();
            for (let y = 600 - p.bottom + 20; y <= 600 - 10; y += 5) {
              const sway = Math.sin(y * frequency + speed + i * 1.5) * amplitude * ((600 - y) / p.bottom);
              const offsetX = baseX + sway;
              if (y === 600 - p.bottom + 20) ctx.moveTo(offsetX, y);
              else ctx.lineTo(offsetX, y);
            }
            ctx.stroke();
          }
        }
        
        // Junkyard - Metal patches
        if (selectedMap === 4) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
          ctx.fillRect(p.x + 5, 20, 20, 15);
          ctx.fillRect(p.x + pipeWidth - 25, 50, 20, 15);
          ctx.fillRect(p.x + 30, p.top - 40, 25, 18);
          ctx.fillRect(p.x + 10, 600 - p.bottom - 60, 20, 15);
          ctx.fillRect(p.x + pipeWidth - 30, 600 - p.bottom - 30, 20, 15);
          ctx.fillStyle = 'rgba(139, 69, 19, 0.5)';
          ctx.beginPath();
          ctx.arc(p.x + 15, p.top - 25, 8, 0, Math.PI * 2);
          ctx.fill();
        }
        
        // Cyberpunk - Pulsing neon
        if (selectedMap === 5) {
          const pulseIntensity = 15 + Math.sin(frame * 0.1) * 10;
          ctx.shadowColor = '#FF4081';
          ctx.shadowBlur = pulseIntensity;
          ctx.strokeStyle = `rgba(255, 64, 129, ${0.6 + Math.sin(frame * 0.1) * 0.3})`;
          ctx.lineWidth = 3;
          ctx.strokeRect(capX, p.top - 28, capWidth, 30);
          ctx.strokeRect(capX, 600 - p.bottom - 2, capWidth, 30);
          ctx.shadowBlur = 0;
        }
        
        // Forest - Helix vines
        if (selectedMap === 6) {
          ctx.strokeStyle = '#228B22';
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
            const baseX = p.x + 12 + i * 22;
            const amplitude = 8;
            const frequency = 0.08;
            const speed = frame * 0.03;
            ctx.beginPath();
            for (let y = 0; y <= p.top; y += 5) {
              const offsetX = baseX + Math.sin(y * frequency + speed + i * 2) * amplitude;
              if (y === 0) ctx.moveTo(offsetX, y);
              else ctx.lineTo(offsetX, y);
            }
            ctx.stroke();
            ctx.beginPath();
            for (let y = 600 - p.bottom; y <= 600; y += 5) {
              const offsetX = baseX + Math.sin(y * frequency + speed + i * 2) * amplitude;
              if (y === 600 - p.bottom) ctx.moveTo(offsetX, y);
              else ctx.lineTo(offsetX, y);
            }
            ctx.stroke();
          }
          // Leaf clusters
          ctx.fillStyle = '#32CD32';
          const leafPositions = [p.x + 8, p.x + pipeWidth - 12];
          leafPositions.forEach(lx => {
            ctx.beginPath(); ctx.ellipse(lx, p.top - 32, 7, 4, Math.PI / 4, 0, Math.PI * 2); ctx.fill();

    function drawGatekeeper() {

      ctx.strokeStyle = '#1a1a1a';

      ctx.fillRect(x - 20, y - 70, 40, 28);
      
      // Visor (glowing cyan)

          const waveOffset = Math.sin(time * 1.5 + i * 0.8 + j * 0.4) * (6 + j * 1.5);

    function drawPlayerProjectiles() {
      playerProjectiles.forEach(p => {
        if (p.type === 'energy') {
          // Classic - Blue Energy Ball
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          grad.addColorStop(0, '#fff');
          grad.addColorStop(0.3, p.color);
          grad.addColorStop(1, 'rgba(0, 191, 255, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.4, 0, Math.PI * 2);
          ctx.fill();
        } 
        else if (p.type === 'fireball') {
          // Red Parrot - Fireball
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          grad.addColorStop(0, '#FFEB3B');
          grad.addColorStop(0.4, '#FF5722');
          grad.addColorStop(1, 'rgba(255, 87, 34, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          // Flame trail
          ctx.fillStyle = 'rgba(255, 152, 0, 0.6)';
          ctx.beginPath();
          ctx.arc(p.x - 8, p.y, p.size * 0.6, 0, Math.PI * 2);
          ctx.fill();
        } 
        else if (p.type === 'pierce') {
          // Eagle - Piercing Bolt
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(frame * 0.2);
          
          // Electric bolt shape
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.moveTo(p.size, 0);
          ctx.lineTo(-p.size * 0.5, -p.size * 0.5);
          ctx.lineTo(0, -p.size * 0.2);
          ctx.lineTo(-p.size * 0.5, p.size * 0.5);
          ctx.closePath();
          ctx.fill();
          
          // Inner glow
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(0, 0, p.size * 0.3, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.restore();
        } 
        else if (p.type === 'ice') {
          // Owl - Ice Crystal
          ctx.save();
          ctx.translate(p.x, p.y);
          
          // Crystal shape
          ctx.fillStyle = p.color;
          ctx.shadowColor = '#00BCD4';
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.moveTo(0, -p.size);
          ctx.lineTo(p.size * 0.7, 0);
          ctx.lineTo(0, p.size);
          ctx.lineTo(-p.size * 0.7, 0);
          ctx.closePath();
          ctx.fill();
          
          // Inner shine
          ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.beginPath();
          ctx.moveTo(0, -p.size * 0.5);
          ctx.lineTo(p.size * 0.3, 0);
          ctx.lineTo(0, p.size * 0.3);
          ctx.lineTo(-p.size * 0.3, 0);
          ctx.closePath();
          ctx.fill();
          
          ctx.restore();
        } 
        else if (p.type === 'phoenix') {
          // Phoenix - Fire Explosion
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 1.5);
          grad.addColorStop(0, '#FFEB3B');
          grad.addColorStop(0.3, '#FF5722');
          grad.addColorStop(0.6, '#D84315');
          grad.addColorStop(1, 'rgba(216, 67, 21, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
          ctx.fill();
          
          // Flame particles
          ctx.fillStyle = '#FF9800';
          for (let i = 0; i < 5; i++) {
            const angle = (frame * 0.2) + (i * Math.PI * 2 / 5);
            const px = p.x + Math.cos(angle) * p.size * 0.7;
            const py = p.y + Math.sin(angle) * p.size * 0.7;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        } 
        else if (p.type === 'golden') {
          // Golden Eagle - Super Laser Beam
          const grad = ctx.createLinearGradient(p.x - p.size * 2, p.y, p.x + p.size * 2, p.y);
          grad.addColorStop(0, 'rgba(255, 215, 0, 0)');
          grad.addColorStop(0.3, 'rgba(255, 215, 0, 0.3)');
          grad.addColorStop(0.5, '#FFD700');
          grad.addColorStop(0.7, 'rgba(255, 215, 0, 0.3)');
          grad.addColorStop(1, 'rgba(255, 215, 0, 0)');
          ctx.fillStyle = grad;
          ctx.fillRect(p.x - p.size * 2, p.y - p.size * 0.3, p.size * 4, p.size * 0.6);
          
          // Core beam
          ctx.fillStyle = '#FFF9C4';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.ellipse(p.x, p.y, p.size, p.size * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Star particles
          ctx.fillStyle = '#FFEB3B';
          for (let i = 0; i < 4; i++) {
            const angle = (frame * 0.15) + (i * Math.PI / 2);
            const px = p.x + Math.cos(angle) * p.size * 0.8;
            const py = p.y + Math.sin(angle) * p.size * 0.4;
            ctx.beginPath();
            ctx.arc(px, py, 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.shadowBlur = 0;
        } 
        else {
          // Default - Simple glowing orb
          ctx.fillStyle = p.color || '#00FFFF';
          ctx.shadowColor = p.color || '#00FFFF';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size || 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      });
    }
    
    function drawBoss() { drawGatekeeper(); }
    
    function drawProjectiles() {
      projectiles.forEach(p => {
        ctx.fillStyle='#E74C3C';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle='#F39C12';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function drawParticles() {
      particles.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        p.vy += 0.1;
        if (p.life <= 0) particles.splice(i, 1);
      });
    }
    
    function spawnParticles(x, y, color, c = 10) {
      for (let i = 0; i < c; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, size: Math.random() * 5 + 2, color, life: 1 });
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(score, 200, 50);
      ctx.fillText(score, 200, 50);
      ctx.font = '24px Arial';
      ctx.textAlign = 'left';

      if (bird.hasShield) { ctx.fillText('🛡️', px, 40); px += 35; }
      if (bird.slowMotion) { ctx.fillText('⚡', px, 40); px += 35; }
      if (bird.hasDoubleJump) { ctx.fillText('🦅', px, 40); }
      
      if (bossActive && boss && boss.hp > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 90, 150, 15);
        const hpPercent = boss.hp / boss.maxHp;
        ctx.fillStyle = '#E74C3C';
        ctx.fillRect(12, 92, hpPercent * 146, 11);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 90, 150, 15);
        
        const timerSeconds = Math.ceil(bossTimer / 60);
        ctx.fillStyle = '#FF6B6B';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⏱️ ' + timerSeconds + 's | [X] ATTACK!', 200, 80);
      }
    }
